# .github/workflows/update_4tochki.yml
name: Update 4tochki Products and Deploy to Pages

on:
  push:
    branches: ["main"]
    paths:
      - '4tyre2.py'          # запускать при изменении этого скрипта
  schedule:
    # Запуск каждый день в 4:10 по новосибирскому времени (UTC+7)
    - cron: "10 21 * * *"
  workflow_dispatch:
    inputs:
      refresh_cache:
        description: 'Принудительно обновить кэш изображений'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages-4tochki"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------- Кэш для image_cache_4tochki.json ----------
      - name: Cache image check results (4tochki)
        uses: actions/cache@v4
        with:
          path: image_cache_4tochki.json
          key: image-cache-4tochki-${{ runner.os }}-${{ hashFiles('4tyre2.py') }}
          restore-keys: |
            image-cache-4tochki-${{ runner.os }}-

      # ---------- Запуск скрипта ----------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run 4tochki script
        run: python 4tyre2.py
        env:
          IMAGE_CACHE_REFRESH: ${{ inputs.refresh_cache == true && 'true' || 'false' }}
        continue-on-error: false   # лучше остановить workflow при ошибке

      # ---------- Коммитим изменения ----------
      - name: Check for changes
        id: changes
        run: |
          git add 4tyre_test2.xml 4tyres_nsk2.xml 4tyres_gruz2.xml image_cache_4tochki.json
          if git diff-index --quiet HEAD; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git commit -m 'Daily update of 4tochki products XML'
          git pull --rebase origin main
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---------- Деплой на GitHub Pages ----------
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
